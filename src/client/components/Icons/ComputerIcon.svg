<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Monitor body -->
  <rect x="8" y="8" width="84" height="62" rx="6" fill="#111"/>

  <!-- Screen -->
  <rect x="16" y="15" width="68" height="48" rx="3" fill="#001a00"/>

  <!-- Binary digits on screen -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" filter="url(#glow)">
    <text x="24" y="34" opacity="1">1</text>
    <text x="36" y="28" opacity="0.5">0</text>
    <text x="36" y="40" opacity="1">1</text>
    <text x="48" y="34" opacity="0.6">0</text>
    <text x="60" y="28" opacity="1">1</text>
    <text x="60" y="40" opacity="0.4">0</text>
    <text x="72" y="34" opacity="1">1</text>
  </g>

  <!-- Neck -->
  <rect x="44" y="70" width="12" height="10" fill="#111"/>

  <!-- Base -->
  <rect x="28" y="78" width="44" height="7" rx="3" fill="#1a1a1a"/>

  <!-- Power LED -->
  <circle cx="50" cy="66" r="2" fill="#00ff41" filter="url(#glow)"/>
</svg>